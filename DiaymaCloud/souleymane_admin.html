<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIAYMA - Admin Créateur Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
            --text-sec: #94a3b8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 20px;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(at 0% 0%, #1e1b4b 0%, transparent 50%),
                radial-gradient(at 100% 0%, #0c4a6e 0%, transparent 50%);
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 45px 35px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            text-align: center;
        }

        .logo-box {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #000, #1e293b);
            border: 2px solid var(--border);
            border-radius: 22px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 900;
            color: #fff;
            font-family: serif;
        }

        .input {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            margin-bottom: 25px;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .result-box {
            margin-top: 35px;
            display: none;
            padding: 25px;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 20px;
            border: 1px dashed var(--primary);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="mesh-bg"></div>
    <div class="card">
        <div class="logo-box">D</div>
        <h2 style="margin:0 0 8px 0; font-size: 1.6rem; font-weight: 800;">Accès Créateur</h2>
        <p style="color:var(--text-sec);font-size:0.95rem;margin-bottom:35px">Générateur de Licences DIAYMA Pro.</p>
        <label
            style="font-weight:600;font-size:0.8rem;margin-bottom:10px;display:block;text-align:left;color:var(--text-sec);text-transform:uppercase;letter-spacing:1px">ID
            Admin Boutique :</label>
        <input type="text" id="gen_admin_id" class="input" placeholder="Ex: 7A31E0AA" autocomplete="off">
        <button class="btn" onclick="generateLicense()"><i data-lucide="key"></i> Générer la Clé</button>
        <div id="gen_result" class="result-box">
            <span
                style="font-size:0.8rem;color:var(--text-sec);font-weight:700;text-transform:uppercase;letter-spacing:1px">CLÉ
                D'ACTIVATION</span><br>
            <b id="gen_key_val"
                style="font-size:2rem;color:#fff;letter-spacing:4px;display:block;margin-top:10px;filter:drop-shadow(0 0 10px var(--primary))"></b>
        </div>
    </div>
    <script>
        lucide.createIcons();
        async function generateLicense() {
            const adminId = document.getElementById('gen_admin_id').value.trim().toUpperCase();
            if (!adminId) return;
            const textToHash = adminId + "SOULEY";
            const encoder = new TextEncoder();
            const data = encoder.encode(textToHash);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            const key = hashHex.substring(0, 8).toUpperCase();
            const formattedKey = key.substring(0, 4) + "-" + key.substring(4);
            document.getElementById('gen_result').style.display = 'block';
            document.getElementById('gen_key_val').innerText = formattedKey;
        }
    </script>
</body>

</html>
